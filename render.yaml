services:
  - type: web
    name: pulse-simulator
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: standard
    region: frankfurt
    envVars:
      - key: ZEP_API_KEY
        sync: false
      - key: LLM_BOOST_API_KEY
        sync: false
      - key: LLM_BOOST_BASE_URL
        value: https://api.openai.com/v1
      - key: LLM_BOOST_MODEL_NAME
        value: gpt-4o
      - key: OPENAI_API_KEY
        sync: false
    disk:
      name: mirofish-uploads
      mountPath: /app/backend/uploads
      sizeGB: 1
